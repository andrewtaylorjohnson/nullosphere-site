<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Simple 3D Demo</title>
  <style>
    /* ── Reset & Win2K base ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --win-bg:       #008080;   /* classic teal desktop */
      --win-face:     #d4d0c8;   /* widget face grey */
      --win-dark:     #808080;   /* shadow edge */
      --win-darker:   #404040;
      --win-light:    #ffffff;
      --win-title-a:  #000080;   /* active title bar blue */
      --win-title-b:  #1084d0;
      --win-text:     #000000;
      --win-btn:      #d4d0c8;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--win-bg);
      font-family: "Tahoma", "MS Sans Serif", Arial, sans-serif;
      font-size: 11px;
    }

    /* ── Desktop icons ──────────────────────────────────────────────── */
    #desktop-icons {
      position: absolute;
      top: 16px; left: 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 10;
    }
    .icon {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; width: 64px;
    }
    .icon-img {
      width: 32px; height: 32px;
      image-rendering: pixelated;
    }
    /* pixel-art 3D box icon */
    .icon-canvas {
      width: 32px; height: 32px;
      image-rendering: pixelated;
    }
    .icon span {
      color: #fff;
      text-shadow: 1px 1px 2px #000;
      font-size: 10px;
      text-align: center;
      line-height: 1.3;
    }
    .icon:focus-within span, .icon:hover span {
      background: var(--win-title-a);
      outline: 1px dotted #fff;
    }

    /* ── Win2K Window ───────────────────────────────────────────────── */
    #win-window {
      position: absolute;
      top: 30px; left: 100px;
      width: calc(100vw - 120px);
      height: calc(100vh - 80px);
      display: flex; flex-direction: column;
      /* raised bevel */
      border-top:    2px solid var(--win-light);
      border-left:   2px solid var(--win-light);
      border-right:  2px solid var(--win-darker);
      border-bottom: 2px solid var(--win-darker);
      box-shadow: 1px 1px 0 var(--win-dark), -1px -1px 0 var(--win-face);
      z-index: 5;
    }

    /* Title bar */
    #title-bar {
      height: 24px;
      background: linear-gradient(to right, var(--win-title-a), var(--win-title-b));
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 3px 0 5px;
      cursor: default;
      user-select: none;
      flex-shrink: 0;
    }
    #title-bar .title-left {
      display: flex; align-items: center; gap: 5px;
      color: #fff;
      font-weight: bold; font-size: 11px;
    }
    #title-bar .title-icon {
      width: 14px; height: 14px;
    }
    /* Window control buttons */
    .win-btns { display: flex; gap: 2px; }
    .win-btn {
      width: 18px; height: 16px;
      background: var(--win-btn);
      border-top:    1px solid var(--win-light);
      border-left:   1px solid var(--win-light);
      border-right:  1px solid var(--win-darker);
      border-bottom: 1px solid var(--win-darker);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: bold; cursor: pointer;
      color: #000;
    }
    .win-btn:active {
      border-top:    1px solid var(--win-darker);
      border-left:   1px solid var(--win-darker);
      border-right:  1px solid var(--win-light);
      border-bottom: 1px solid var(--win-light);
    }
    .win-btn.close { color: #000; font-size: 10px; }

    /* Menu bar */
    #menu-bar {
      height: 22px;
      background: var(--win-face);
      border-bottom: 1px solid var(--win-dark);
      display: flex; align-items: center; padding: 0 4px;
      gap: 2px; flex-shrink: 0;
    }
    .menu-item {
      padding: 2px 8px;
      font-size: 11px;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .menu-item:hover {
      border-top:    1px solid var(--win-light);
      border-left:   1px solid var(--win-light);
      border-right:  1px solid var(--win-dark);
      border-bottom: 1px solid var(--win-dark);
    }

    /* Toolbar */
    #toolbar {
      height: 30px;
      background: var(--win-face);
      border-bottom: 1px solid var(--win-dark);
      display: flex; align-items: center; padding: 2px 6px; gap: 4px;
      flex-shrink: 0;
    }
    .tool-btn {
      height: 22px; min-width: 22px; padding: 0 6px;
      background: var(--win-btn);
      border-top:    2px solid var(--win-light);
      border-left:   2px solid var(--win-light);
      border-right:  2px solid var(--win-darker);
      border-bottom: 2px solid var(--win-darker);
      font-size: 10px; cursor: pointer; display: flex; align-items: center;
      gap: 3px; white-space: nowrap;
    }
    .tool-btn:active {
      border-top:    2px solid var(--win-darker);
      border-left:   2px solid var(--win-darker);
      border-right:  2px solid var(--win-light);
      border-bottom: 2px solid var(--win-light);
    }
    .tool-sep {
      width: 1px; height: 20px;
      background: var(--win-dark);
      margin: 0 2px;
    }

    /* Canvas area */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
      /* inset bevel */
      border-top:    2px solid var(--win-dark);
      border-left:   2px solid var(--win-dark);
      border-right:  2px solid var(--win-light);
      border-bottom: 2px solid var(--win-light);
    }
    #canvas-wrap canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* Status bar */
    #status-bar {
      height: 22px;
      background: var(--win-face);
      border-top: 1px solid var(--win-dark);
      display: flex; align-items: center;
      padding: 0 4px; gap: 4px; flex-shrink: 0;
    }
    .status-pane {
      flex: 1; height: 16px;
      border-top:    1px solid var(--win-dark);
      border-left:   1px solid var(--win-dark);
      border-right:  1px solid var(--win-light);
      border-bottom: 1px solid var(--win-light);
      padding: 0 4px;
      display: flex; align-items: center;
      font-size: 10px;
    }
    .status-pane.fixed { flex: 0 0 auto; width: 120px; }

    /* ── Taskbar ────────────────────────────────────────────────────── */
    #taskbar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 30px;
      background: var(--win-face);
      border-top: 2px solid var(--win-light);
      display: flex; align-items: center;
      padding: 2px 3px; gap: 4px;
      z-index: 20;
    }
    #start-btn {
      height: 22px; padding: 0 10px;
      background: var(--win-btn);
      border-top:    2px solid var(--win-light);
      border-left:   2px solid var(--win-light);
      border-right:  2px solid var(--win-darker);
      border-bottom: 2px solid var(--win-darker);
      font-weight: bold; font-size: 11px;
      cursor: pointer; display: flex; align-items: center; gap: 4px;
    }
    #start-btn:active {
      border-top:    2px solid var(--win-darker);
      border-left:   2px solid var(--win-darker);
      border-right:  2px solid var(--win-light);
      border-bottom: 2px solid var(--win-light);
    }
    .taskbar-btn {
      height: 22px; padding: 0 10px; min-width: 120px;
      background: var(--win-btn);
      border-top:    2px solid var(--win-darker);
      border-left:   2px solid var(--win-darker);
      border-right:  2px solid var(--win-light);
      border-bottom: 2px solid var(--win-light);
      font-size: 11px; cursor: pointer;
      display: flex; align-items: center; gap: 4px;
      overflow: hidden; white-space: nowrap;
    }
    #taskbar-sep { width: 1px; height: 22px; background: var(--win-dark); }
    #clock {
      margin-left: auto;
      height: 22px; padding: 0 8px;
      border-top:    1px solid var(--win-dark);
      border-left:   1px solid var(--win-dark);
      border-right:  1px solid var(--win-light);
      border-bottom: 1px solid var(--win-light);
      display: flex; align-items: center;
      font-size: 11px;
    }

    /* ── Spinning cube desktop icon (SVG-drawn) ─────────────────────── */
    .pixel-box {
      width: 32px; height: 32px;
    }
  </style>
</head>
<body>

<!-- Desktop icons -->
<div id="desktop-icons">
  <div class="icon" tabindex="0">
    <svg class="pixel-box" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <rect x="4" y="0" width="11" height="9" fill="#0000aa"/>
      <rect x="4" y="0" width="11" height="1" fill="#6666ff"/>
      <rect x="4" y="0" width="1" height="9" fill="#6666ff"/>
      <rect x="0" y="4" width="11" height="9" fill="#00aaff"/>
      <rect x="0" y="4" width="11" height="1" fill="#99ddff"/>
      <rect x="0" y="4" width="1" height="9" fill="#99ddff"/>
      <rect x="11" y="4" width="1" height="5" fill="#0066aa"/>
      <rect x="4" y="9" width="7" height="4" fill="#004488"/>
    </svg>
    <span>My 3D Demo</span>
  </div>
  <div class="icon" tabindex="0">
    <svg class="pixel-box" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <rect x="1" y="2" width="14" height="11" fill="#ffffcc"/>
      <rect x="1" y="2" width="14" height="1" fill="#999"/>
      <rect x="1" y="2" width="1" height="11" fill="#999"/>
      <rect x="3" y="4" width="4" height="4" fill="#ffaaaa"/>
      <rect x="8" y="4" width="5" height="1" fill="#aaa"/>
      <rect x="8" y="6" width="5" height="1" fill="#aaa"/>
      <rect x="3" y="9" width="10" height="1" fill="#aaa"/>
      <rect x="3" y="11" width="7" height="1" fill="#aaa"/>
    </svg>
    <span>Readme.txt</span>
  </div>
  <div class="icon" tabindex="0">
    <svg class="pixel-box" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <rect x="1" y="4" width="9" height="7" fill="#d4d0c8"/>
      <rect x="1" y="4" width="9" height="1" fill="#fff"/>
      <rect x="1" y="4" width="1" height="7" fill="#fff"/>
      <rect x="9" y="4" width="1" height="7" fill="#808080"/>
      <rect x="1" y="10" width="9" height="1" fill="#808080"/>
      <rect x="6" y="1" width="9" height="7" fill="#c8c4b8"/>
      <rect x="6" y="1" width="9" height="1" fill="#fff"/>
      <rect x="6" y="1" width="1" height="7" fill="#fff"/>
      <rect x="14" y="1" width="1" height="7" fill="#505050"/>
      <rect x="6" y="7" width="9" height="1" fill="#505050"/>
    </svg>
    <span>Recycle Bin</span>
  </div>
</div>

<!-- Main Window -->
<div id="win-window">
  <!-- Title bar -->
  <div id="title-bar">
    <div class="title-left">
      <svg class="title-icon" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
        <rect x="3" y="0" width="8" height="7" fill="#0044cc"/>
        <rect x="0" y="3" width="8" height="7" fill="#44aaff"/>
        <rect x="8" y="3" width="1" height="4" fill="#0066aa"/>
        <rect x="3" y="7" width="5" height="3" fill="#002288"/>
      </svg>
      Simple 3D Demo — [Scene1]
    </div>
    <div class="win-btns">
      <div class="win-btn" title="Minimize">_</div>
      <div class="win-btn" title="Maximize">□</div>
      <div class="win-btn close" title="Close">✕</div>
    </div>
  </div>

  <!-- Menu bar -->
  <div id="menu-bar">
    <div class="menu-item">File</div>
    <div class="menu-item">Edit</div>
    <div class="menu-item">View</div>
    <div class="menu-item">Scene</div>
    <div class="menu-item">Render</div>
    <div class="menu-item">Help</div>
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <div class="tool-btn">▶ Play</div>
    <div class="tool-btn">⏸ Pause</div>
    <div class="tool-btn">⏹ Stop</div>
    <div class="tool-sep"></div>
    <div class="tool-btn">+ Add Cube</div>
    <div class="tool-btn">⟳ Reset</div>
    <div class="tool-sep"></div>
    <div class="tool-btn">🔲 Wireframe</div>
    <div class="tool-btn">💡 Lighting</div>
    <div class="tool-sep"></div>
    <div class="tool-btn">? Help</div>
  </div>

  <!-- 3D canvas -->
  <div id="canvas-wrap">
    <!-- Three.js renders here -->
  </div>

  <!-- Status bar -->
  <div id="status-bar">
    <div class="status-pane">Ready</div>
    <div class="status-pane fixed" id="fps-pane">FPS: —</div>
    <div class="status-pane fixed">Cubes: 5</div>
    <div class="status-pane fixed" id="cam-pane">Cam: (0.0, 2.0, 8.0)</div>
  </div>
</div>

<!-- Taskbar -->
<div id="taskbar">
  <div id="start-btn">
    <svg width="12" height="12" viewBox="0 0 4 4" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <rect x="0" y="0" width="2" height="2" fill="#ff0000"/>
      <rect x="2" y="0" width="2" height="2" fill="#00aa00"/>
      <rect x="0" y="2" width="2" height="2" fill="#0000ff"/>
      <rect x="2" y="2" width="2" height="2" fill="#ffff00"/>
    </svg>
    <b>Start</b>
  </div>
  <div id="taskbar-sep"></div>
  <div class="taskbar-btn">
    <svg width="12" height="12" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <rect x="3" y="0" width="8" height="7" fill="#0044cc"/>
      <rect x="0" y="3" width="8" height="7" fill="#44aaff"/>
    </svg>
    Simple 3D Demo
  </div>
  <div id="clock">12:00 PM</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script>
  // ── Three.js scene setup ─────────────────────────────────────
  const wrap = document.getElementById('canvas-wrap');

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x101114);
  scene.fog = new THREE.Fog(0x101114, 15, 35);

  const W = wrap.clientWidth, H = wrap.clientHeight;
  const camera = new THREE.PerspectiveCamera(70, W / H, 0.1, 100);
  camera.position.set(0, 2, 8);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  wrap.appendChild(renderer.domElement);

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const dir = new THREE.DirectionalLight(0xffffff, 1.2);
  dir.position.set(5, 8, 6);
  scene.add(dir);

  // Grid
  const grid = new THREE.GridHelper(20, 20, 0x666666, 0x333333);
  scene.add(grid);

  // Cubes
  const cubes = [];
  const cubeGeo = new THREE.BoxGeometry(1, 1, 1);

  function makeCube(x, y, z, color, sx=1, sy=1, sz=1) {
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.35, metalness: 0.1 });
    const mesh = new THREE.Mesh(cubeGeo, mat);
    mesh.position.set(x, y, z);
    mesh.scale.set(sx, sy, sz);
    scene.add(mesh);
    cubes.push(mesh);
  }

  makeCube(0,    1,    0,    0x00ffd0);
  makeCube(2.2,  1.4, -2,   0xff8844, 0.8, 1.3, 0.8);
  makeCube(-2.5, 0.8, -3.5, 0x66aaff, 1.2, 0.7, 1.2);
  makeCube(1,    2.2, -5.5, 0xff44aa, 0.7, 0.7, 1.5);
  makeCube(-1.2, 1.8, -7,   0xffff66, 1.4, 0.5, 0.5);

  const farGeo = new THREE.BoxGeometry(2.5, 2.5, 2.5);
  const farMat = new THREE.MeshStandardMaterial({ color: 0xffffff, wireframe: true });
  const farBox = new THREE.Mesh(farGeo, farMat);
  farBox.position.set(0, 2, -12);
  scene.add(farBox);

  // ── Status / FPS ─────────────────────────────────────────────
  const fpsPan = document.getElementById('fps-pane');
  const camPan = document.getElementById('cam-pane');
  let lastFpsTime = 0, frames = 0;

  // ── Clock ────────────────────────────────────────────────────
  function updateClock() {
    const d = new Date();
    let h = d.getHours(), m = d.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('clock').textContent =
      h + ':' + String(m).padStart(2,'0') + ' ' + ampm;
  }
  updateClock();
  setInterval(updateClock, 10000);

  // ── Toolbar buttons ──────────────────────────────────────────
  let paused = false;
  let wireMode = false;

  document.querySelectorAll('.tool-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = btn.textContent.trim();
      if (t.includes('Pause'))  { paused = true; }
      if (t.includes('Play'))   { paused = false; }
      if (t.includes('Stop'))   { paused = true; cubes.forEach(c => { c.rotation.set(0,0,0); }); }
      if (t.includes('Wireframe')) {
        wireMode = !wireMode;
        cubes.forEach(c => { c.material.wireframe = wireMode; });
        farBox.material.wireframe = !wireMode; // invert wireframe cube
      }
      if (t.includes('Add Cube')) {
        const colors = [0xff0000,0x00ff00,0x0088ff,0xffaa00,0xff00ff];
        makeCube(
          (Math.random()-0.5)*8,
          1 + Math.random()*2,
          -(Math.random()*10),
          colors[Math.floor(Math.random()*colors.length)]
        );
        document.querySelector('.status-pane.fixed:last-of-type').textContent =
          'Cubes: ' + cubes.length;
      }
      if (t.includes('Reset')) {
        cubes.forEach(c => { c.rotation.set(0,0,0); c.position.y = c.position.y; });
        paused = false;
      }
    });
  });

  // ── Window buttons (cosmetic) ────────────────────────────────
  document.querySelectorAll('.win-btn').forEach(b => {
    b.addEventListener('click', () => {}); // no-op but feels clicky
  });

  // ── Animate ─────────────────────────────────────────────────
  function animate(t) {
    requestAnimationFrame(animate);

    // FPS counter
    frames++;
    if (t - lastFpsTime >= 1000) {
      fpsPan.textContent = 'FPS: ' + frames;
      frames = 0; lastFpsTime = t;
    }

    if (!paused) {
      const time = t * 0.001;
      cubes.forEach((cube, i) => {
        cube.rotation.x += 0.01 + i * 0.002;
        cube.rotation.y += 0.012 + i * 0.002;
        cube.position.y += Math.sin(time * 1.2 + i) * 0.003;
      });
      farBox.rotation.x = time * 0.3;
      farBox.rotation.y = time * 0.45;
      camera.position.x = Math.sin(time * 0.35) * 1.2;
    }
    camera.lookAt(0, 1.5, -3);

    camPan.textContent = 'Cam: (' +
      camera.position.x.toFixed(1) + ', ' +
      camera.position.y.toFixed(1) + ', ' +
      camera.position.z.toFixed(1) + ')';

    renderer.render(scene, camera);
  }
  animate(0);

  // ── Resize ───────────────────────────────────────────────────
  const ro = new ResizeObserver(() => {
    const W = wrap.clientWidth, H = wrap.clientHeight;
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
    renderer.setSize(W, H);
  });
  ro.observe(wrap);
</script>
</body>
</html>
