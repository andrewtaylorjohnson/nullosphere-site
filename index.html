<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nullosphere</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
    }
    canvas { display: block; }
    #hint {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }
    #error {
      position: fixed;
      left: 16px;
      right: 16px;
      top: 16px;
      color: #ff8a8a;
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(255,138,138,0.35);
      padding: 10px 12px;
      font: 12px/1.4 monospace;
      white-space: pre-wrap;
      display: none;
      z-index: 20;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="hint">Click a letter</div>
  <div id="error"></div>

  <script type="module">
    import * as THREE from "three";
    import { FontLoader } from "three/addons/loaders/FontLoader.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const errorBox = document.getElementById("error");
    function showError(err) {
      errorBox.style.display = "block";
      errorBox.textContent = String(err && err.stack ? err.stack : err);
      console.error(err);
    }

    try {
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 0.85, 22.5);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      const ambient = new THREE.AmbientLight(0xffffff, 1.45);
      scene.add(ambient);

      const key = new THREE.DirectionalLight(0xfff0d6, 1.8);
      key.position.set(6, 9, 10);
      scene.add(key);

      const fill = new THREE.DirectionalLight(0x8ec5ff, 0.35);
      fill.position.set(-8, 4, 6);
      scene.add(fill);

      const pink = new THREE.DirectionalLight(0xff88cc, 0.22);
      pink.position.set(0, -4, 8);
      scene.add(pink);

      const sphereGroup = new THREE.Group();
      scene.add(sphereGroup);

      function lumpySphereGeometry(radius, seedShift = 0) {
        const g = new THREE.SphereGeometry(radius, 64, 42);
        const pos = g.attributes.position;
        const v = new THREE.Vector3();
        const n = new THREE.Vector3();

        for (let i = 0; i < pos.count; i++) {
          v.fromBufferAttribute(pos, i);
          n.copy(v).normalize();

          const nx = n.x, ny = n.y, nz = n.z;
          const lump =
            Math.sin((nx + seedShift) * 6.0) * 0.12 +
            Math.cos((ny - seedShift * 0.7) * 7.0) * 0.10 +
            Math.sin((nz + seedShift * 1.1) * 8.0) * 0.08 +
            Math.sin((nx * 4.0 + ny * 3.0 + nz * 5.0 + seedShift) * 2.4) * 0.06;

          v.addScaledVector(n, lump);
          v.multiplyScalar(1.0 + Math.sin(nx * 3.2 + seedShift) * 0.01 + Math.cos(nz * 2.4 - seedShift) * 0.01);
          pos.setXYZ(i, v.x, v.y, v.z);
        }

        pos.needsUpdate = true;
        g.computeVertexNormals();
        return g;
      }

      // External GLB planet loader
      const gltfLoader = new GLTFLoader();
      let planetModel = null;

      gltfLoader.load(
        "./assets/planet.glb",
        (gltf) => {
          planetModel = gltf.scene;
          planetModel.scale.set(2.5, 2.5, 2.5);
          planetModel.position.set(0, 0, 0);

          planetModel.traverse((child) => {
            if (child.isMesh && child.material) {
              child.material.roughness = 1.0;
              child.material.metalness = 0.0;
            }
          });

          sphereGroup.add(planetModel);
        },
        undefined,
        (err) => showError("GLB load failed.\n" + err)
      );

      const clayPalette = [0xf44336, 0x1e88e5, 0xfdd835, 0x43a047];
      function makeClayMaterial(color) {
        return new THREE.MeshStandardMaterial({ color, roughness: 1.0, metalness: 0.0, side: THREE.DoubleSide });
      }

      function deformFlatGeometry(geometry, seed = 0) {
        geometry.computeBoundingBox();
        const bb = geometry.boundingBox;
        const center = new THREE.Vector3();
        bb.getCenter(center);

        const pos = geometry.attributes.position;
        const v = new THREE.Vector3();

        for (let i = 0; i < pos.count; i++) {
          v.fromBufferAttribute(pos, i);

          const dx = v.x - center.x;
          const dy = v.y - center.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          v.x += Math.sin((v.y + seed) * 1.8) * 0.008;
          v.y += Math.sin((v.x - seed) * 1.6) * 0.01;
          v.z += (
            Math.sin((v.x + seed) * 3.0) * 0.015 +
            Math.cos((v.y - seed * 0.7) * 2.6) * 0.013
          ) * (0.6 + Math.min(dist / 0.8, 1.0) * 0.4);

          pos.setXYZ(i, v.x, v.y, v.z);
        }

        pos.needsUpdate = true;
        geometry.computeVertexNormals();
        geometry.computeBoundingBox();
        return geometry;
      }

      const phrase = "NULLOSPHERE";
      const letters = [];
      const clickableMeshes = [];
      const textRoot = new THREE.Group();
      scene.add(textRoot);

      function buildLetters(font) {
        const circleRadius = 8.9;
        const arcCenterY = -2.6;
        const arcCenterZ = -1.6;
        const arcSpan = 1.18;
        const letterGap = 0.055;
        const totalSlots = Math.max(phrase.length - 1, 1);

        for (let i = 0; i < phrase.length; i++) {
          const ch = phrase[i];
          const shapes = font.generateShapes(ch, 0.92);
          const geom = new THREE.ShapeGeometry(shapes, 12);

          deformFlatGeometry(geom, i * 0.57 + 0.2);
          geom.computeBoundingBox();
          const bb = geom.boundingBox;
          const width = bb.max.x - bb.min.x;
          const height = bb.max.y - bb.min.y;
          geom.translate(-(bb.min.x + width / 2), -(bb.min.y + height / 2), 0);

          const mesh = new THREE.Mesh(geom, makeClayMaterial(clayPalette[i % clayPalette.length]));
          const t = (i / totalSlots) - 0.5;
          const angle = t * (arcSpan + letterGap * phrase.length);

          mesh.position.set(
            Math.sin(angle) * circleRadius,
            arcCenterY + Math.cos(angle) * circleRadius,
            arcCenterZ - Math.abs(angle) * 0.18
          );
          mesh.rotation.set(0, 0, -angle);

          mesh.userData = {
            phase: Math.random() * Math.PI * 2,
            kick: 0,
            kickVel: 0,
            basePos: mesh.position.clone(),
            baseRot: mesh.rotation.clone()
          };

          letters.push(mesh);
          clickableMeshes.push(mesh);
          textRoot.add(mesh);
        }
      }

      const loader = new FontLoader();
      loader.load(
        "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json",
        (font) => {
          buildLetters(font);
          animate();
        },
        undefined,
        (err) => showError("Font load failed.\n" + err)
      );

      let mouseX = 0, mouseY = 0;
      window.addEventListener("pointermove", (e) => {
        mouseX = (e.clientX / window.innerWidth) * 2 - 1;
        mouseY = (e.clientY / window.innerHeight) * 2 - 1;
      });

      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();

      window.addEventListener("click", (e) => {
        pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
        pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        const hits = raycaster.intersectObjects(clickableMeshes, false);
        if (hits.length > 0) {
          const letter = hits[0].object;
          letter.userData.kickVel += 2.2;
          letter.userData.kick = Math.min(letter.userData.kick + 0.95, 2.8);
        }
      });

      const clock = new THREE.Clock();

      function update(dt, t) {
        sphereGroup.rotation.y += dt * 0.18;
        sphereGroup.rotation.x = Math.sin(t * 0.28) * 0.08;
        sphereGroup.rotation.z += dt * 0.035;

        if (planetModel) {
          planetModel.position.y = Math.sin(t * 0.9) * 0.06;
          const baseScale = 2.5;
          planetModel.scale.set(
            baseScale * (1 + Math.sin(t * 1.1) * 0.012),
            baseScale * (1 + Math.cos(t * 1.3) * 0.01),
            baseScale * (1 + Math.sin(t * 1.0 + 0.8) * 0.012)
          );
        }

        for (const letter of letters) {
          const u = letter.userData;
          u.kickVel += (-u.kick * 8.4 - u.kickVel * 5.3) * dt;
          u.kick += u.kickVel * dt;
          if (Math.abs(u.kick) < 0.0002 && Math.abs(u.kickVel) < 0.0002) {
            u.kick = 0;
            u.kickVel = 0;
          }

          const idleA = Math.sin(t * 1.1 + u.phase);
          const idleB = Math.cos(t * 1.45 + u.phase * 1.4);
          const idleC = Math.sin(t * 0.8 + u.phase * 0.6);

          letter.position.copy(u.basePos);
          letter.position.y += idleA * 0.06;
          letter.position.z += idleB * 0.05;

          letter.rotation.set(
            idleB * 0.014 + u.kick * 0.08,
            idleC * 0.012 + u.kick * 0.05,
            u.baseRot.z + idleA * 0.01 + u.kick * 0.09
          );

          const scaleBase = 1 + idleB * 0.008;
          letter.scale.set(
            scaleBase + u.kick * 0.05,
            scaleBase - u.kick * 0.03,
            1 + Math.abs(u.kick) * 0.02
          );
        }

        camera.position.x += ((mouseX * 1.3) - camera.position.x) * dt * 1.3;
        camera.position.y += ((0.85 - mouseY * 0.75) - camera.position.y) * dt * 1.3;
        camera.lookAt(0, 1.3, 0);
      }

      function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.033);
        const t = clock.elapsedTime;
        update(dt, t);
        renderer.render(scene, camera);
      }

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

    } catch (err) {
      showError(err);
    }
  </script>
</body>
</html>
