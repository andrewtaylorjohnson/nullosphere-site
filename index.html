<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nullosphere</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
    }
    canvas { display: block; }
    #error {
      position: fixed;
      left: 16px;
      right: 16px;
      top: 16px;
      color: #ff8a8a;
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(255,138,138,0.35);
      padding: 10px 12px;
      font: 12px/1.4 monospace;
      white-space: pre-wrap;
      display: none;
      z-index: 20;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
    <div id="error"></div>
  <div id="status" style="position:fixed;left:16px;bottom:16px;color:rgba(255,255,255,0.7);background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.12);padding:8px 10px;font:12px/1.3 monospace;z-index:20;">Loading planet.glb…</div>

  <script type="module">
    import * as THREE from "three";
    import { FontLoader } from "three/addons/loaders/FontLoader.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const errorBox = document.getElementById("error");
    const statusBox = document.getElementById("status");
    function showError(err) {
      errorBox.style.display = "block";
      errorBox.textContent = String(err && err.stack ? err.stack : err);
      console.error(err);
    }

    try {
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      const camera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 4.2, 22.5);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      // Full-scene animated grayscale noise background
      const bgUniforms = {
        uTime: { value: 0.0 },
        uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
      };

      const bgMaterial = new THREE.ShaderMaterial({
        uniforms: bgUniforms,
        depthWrite: false,
        depthTest: false,
        side: THREE.DoubleSide,
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = vec4(position.xy, 0.0, 1.0);
          }
        `,
        fragmentShader: `
          varying vec2 vUv;
          uniform float uTime;
          uniform vec2 uResolution;

          vec2 hash2(vec2 p) {
            p = vec2(dot(p, vec2(127.1, 311.7)),
                     dot(p, vec2(269.5, 183.3)));
            return -1.0 + 2.0 * fract(sin(p) * 43758.5453123);
          }

          float noise(in vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            vec2 u = f * f * (3.0 - 2.0 * f);

            return mix(
              mix(dot(hash2(i + vec2(0.0, 0.0)), f - vec2(0.0, 0.0)),
                  dot(hash2(i + vec2(1.0, 0.0)), f - vec2(1.0, 0.0)), u.x),
              mix(dot(hash2(i + vec2(0.0, 1.0)), f - vec2(0.0, 1.0)),
                  dot(hash2(i + vec2(1.0, 1.0)), f - vec2(1.0, 1.0)), u.x),
              u.y);
          }

          float fbm(vec2 p) {
            float v = 0.0;
            float a = 0.5;
            mat2 m = mat2(1.6, 1.2, -1.2, 1.6);
            for (int i = 0; i < 5; i++) {
              v += a * noise(p);
              p = m * p;
              a *= 0.5;
            }
            return v;
          }

          void main() {
            vec2 uv = vUv;
            vec2 p = (uv - 0.5) * vec2(uResolution.x / uResolution.y, 1.0);

            float t = uTime * 0.08;
            float n1 = fbm(p * 3.0 + vec2(t, -t * 0.7));
            float n2 = fbm(p * 6.0 + vec2(-t * 0.6, t * 1.1));
            float n = 0.65 + n1 * 0.22 + n2 * 0.12;

            float vignette = 1.0 - smoothstep(0.35, 0.95, length(uv - 0.5) * 1.35);
            n *= mix(0.72, 1.0, vignette);

            gl_FragColor = vec4(vec3(clamp(n, 0.0, 1.0) * 0.55), 1.0);
          }
        `
      });

      const bgScene = new THREE.Scene();
      const bgCamera = new THREE.Camera();
      const bgQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), bgMaterial);
      bgScene.add(bgQuad);

      const ambient = new THREE.AmbientLight(0xffffff, 1.45);
      scene.add(ambient);

      const key = new THREE.DirectionalLight(0xfff0d6, 1.8);
      key.position.set(6, 9, 10);
      scene.add(key);

      const fill = new THREE.DirectionalLight(0x8ec5ff, 0.35);
      fill.position.set(-8, 4, 6);
      scene.add(fill);

      const pink = new THREE.DirectionalLight(0xff88cc, 0.22);
      pink.position.set(0, -4, 8);
      scene.add(pink);

      const sphereGroup = new THREE.Group();
      scene.add(sphereGroup);

      // Simple fake ambient occlusion / contact shadow under the planet
      const aoTexture = (() => {
        const size = 256;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createRadialGradient(size/2, size/2, 10, size/2, size/2, size/2);
        grad.addColorStop(0, 'rgba(0,0,0,0.5)');
        grad.addColorStop(0.45, 'rgba(0,0,0,0.22)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, size, size);
        const tex = new THREE.CanvasTexture(canvas);
        tex.needsUpdate = true;
        return tex;
      })();

      const aoPlane = new THREE.Mesh(
        new THREE.PlaneGeometry(24, 24),
        new THREE.MeshBasicMaterial({
          map: aoTexture,
          transparent: true,
          opacity: 0.55,
          depthWrite: false
        })
      );
      aoPlane.rotation.x = -Math.PI / 2;
      aoPlane.position.set(0, -7.5, 0);
      scene.add(aoPlane);


      function lumpySphereGeometry(radius, seedShift = 0) {
        const g = new THREE.SphereGeometry(radius, 64, 42);
        const pos = g.attributes.position;
        const v = new THREE.Vector3();
        const n = new THREE.Vector3();

        for (let i = 0; i < pos.count; i++) {
          v.fromBufferAttribute(pos, i);
          n.copy(v).normalize();

          const nx = n.x, ny = n.y, nz = n.z;
          const lump =
            Math.sin((nx + seedShift) * 6.0) * 0.12 +
            Math.cos((ny - seedShift * 0.7) * 7.0) * 0.10 +
            Math.sin((nz + seedShift * 1.1) * 8.0) * 0.08 +
            Math.sin((nx * 4.0 + ny * 3.0 + nz * 5.0 + seedShift) * 2.4) * 0.06;

          v.addScaledVector(n, lump);
          v.multiplyScalar(1.0 + Math.sin(nx * 3.2 + seedShift) * 0.01 + Math.cos(nz * 2.4 - seedShift) * 0.01);
          pos.setXYZ(i, v.x, v.y, v.z);
        }

        pos.needsUpdate = true;
        g.computeVertexNormals();
        return g;
      }

      // External GLB planet loader
      const gltfLoader = new GLTFLoader();
      let planetModel = null;

      gltfLoader.load(
        "./assets/planet.glb",
        (gltf) => {
          planetModel = gltf.scene;

          // Normalize transform so arbitrary models land in the center and fit the scene
          const box = new THREE.Box3().setFromObject(planetModel);
          const size = new THREE.Vector3();
          const center = new THREE.Vector3();
          box.getSize(size);
          box.getCenter(center);

          const maxDim = Math.max(size.x, size.y, size.z) || 1;
          const targetSize = 37.3333333333; // 2x bigger than previous planet target
          const uniformScale = targetSize / maxDim;

          planetModel.position.sub(center);
          planetModel.scale.setScalar(uniformScale);

          planetModel.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = false;
              child.receiveShadow = false;

              if (Array.isArray(child.material)) {
                child.material.forEach((mat) => {
                  if (!mat) return;
                  if ("roughness" in mat) mat.roughness = 1.0;
                  if ("metalness" in mat) mat.metalness = 0.0;
                  mat.side = THREE.DoubleSide;
                  mat.needsUpdate = true;
                });
              } else if (child.material) {
                if ("roughness" in child.material) child.material.roughness = 1.0;
                if ("metalness" in child.material) child.material.metalness = 0.0;
                child.material.side = THREE.DoubleSide;
                child.material.needsUpdate = true;
              }
            }
          });

          sphereGroup.rotation.x =  Math.PI / 6;
          sphereGroup.rotation.y = -Math.PI / 4;
          sphereGroup.add(planetModel);
          loadingGroup.visible = false;
          statusBox.textContent = "planet.glb loaded";
        },
        undefined,
        (err) => {
          statusBox.textContent = "planet.glb failed to load";
          showError("GLB load failed.\n" + err);
        }
      );

      const clayPalette = [0xf44336, 0x1e88e5, 0xfdd835, 0x43a047];
      function makeClayMaterial(color) {
        return new THREE.MeshBasicMaterial({ color, roughness: 1.0, metalness: 0.0, side: THREE.DoubleSide });
      }

      function deformFlatGeometry(geometry, seed = 0) {
        geometry.computeBoundingBox();
        const bb = geometry.boundingBox;
        const center = new THREE.Vector3();
        bb.getCenter(center);

        const pos = geometry.attributes.position;
        const v = new THREE.Vector3();

        for (let i = 0; i < pos.count; i++) {
          v.fromBufferAttribute(pos, i);

          const dx = v.x - center.x;
          const dy = v.y - center.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          v.x += Math.sin((v.y + seed) * 1.8) * 0.008;
          v.y += Math.sin((v.x - seed) * 1.6) * 0.01;
          v.z += (
            Math.sin((v.x + seed) * 3.0) * 0.015 +
            Math.cos((v.y - seed * 0.7) * 2.6) * 0.013
          ) * (0.6 + Math.min(dist / 0.8, 1.0) * 0.4);

          pos.setXYZ(i, v.x, v.y, v.z);
        }

        pos.needsUpdate = true;
        geometry.computeVertexNormals();
        geometry.computeBoundingBox();
        return geometry;
      }

      const phrase = "NULLOSPHERE";
      const letters = [];
      const clickableMeshes = [];
      const letterHitboxes = [];
      const textRoot = new THREE.Group();
      scene.add(textRoot);

      const loadingGroup = new THREE.Group();
      scene.add(loadingGroup);
      let loadingLetters = [];

      // Responsive screen-space-ish text framing
      const composition = {
        textDepthFromCamera: 18.0,   // keep text in a stable screen zone
        textTopScreenY: 0.26,        // 0 = top, 1 = bottom
        textScaleBase: 1.0
      };


      function buildLoadingText(font) {
        const loadingPhrase = "Loading..";
        const spacing = 0.92;
        const totalWidth = (loadingPhrase.length - 1) * spacing;

        for (let i = 0; i < loadingPhrase.length; i++) {
          const ch = loadingPhrase[i];
          const shapes = font.generateShapes(ch, 0.72);
          const geom = new THREE.ShapeGeometry(shapes, 10);

          deformFlatGeometry(geom, i * 0.41 + 0.1);
          geom.computeBoundingBox();
          const bb = geom.boundingBox;
          const width = bb.max.x - bb.min.x;
          const height = bb.max.y - bb.min.y;
          geom.translate(-(bb.min.x + width / 2), -(bb.min.y + height / 2), 0);

          const mesh = new THREE.Mesh(
            geom,
            new THREE.MeshBasicMaterial({
              color: 0xffffff,
              roughness: 1.0,
              metalness: 0.0,
              side: THREE.DoubleSide
            })
          );

          mesh.position.set(i * spacing - totalWidth * 0.5, 0.1, 0.2);
          mesh.userData = {
            basePos: mesh.position.clone(),
            phase: Math.random() * Math.PI * 2
          };

          loadingLetters.push(mesh);
          loadingGroup.add(mesh);
        }
      }

      function buildLetters(font) {
        const circleRadius = 10.8;
        const arcCenterY = -1.6;
        const arcCenterZ = -2.0;
        const arcSpan = 1.18;
        const letterGap = 0.085;
        const totalSlots = Math.max(phrase.length - 1, 1);

        for (let i = 0; i < phrase.length; i++) {
          const ch = phrase[i];
          const shapes = font.generateShapes(ch, 1.38);
          const geom = new THREE.ShapeGeometry(shapes, 12);

          deformFlatGeometry(geom, i * 0.57 + 0.2);
          geom.computeBoundingBox();
          const bb = geom.boundingBox;
          const width = bb.max.x - bb.min.x;
          const height = bb.max.y - bb.min.y;
          geom.translate(-(bb.min.x + width / 2), -(bb.min.y + height / 2), 0);

          const mesh = new THREE.Mesh(geom, makeClayMaterial(clayPalette[i % clayPalette.length]));
          const t = (i / totalSlots) - 0.5;
          const angle = t * (arcSpan + letterGap * phrase.length);

          mesh.position.set(
            Math.sin(angle) * circleRadius,
            arcCenterY + Math.cos(angle) * circleRadius,
            arcCenterZ - Math.abs(angle) * 0.18
          );
          mesh.rotation.set(0, 0, -angle);

          mesh.userData = {
            phase: Math.random() * Math.PI * 2,
            basePos: mesh.position.clone(),
            baseRot: mesh.rotation.clone(),
            bounceTime: 0,
            bounceOffset: Math.random() * 0.8,
            jumpHeight: 0.0,
            isJumping: false
          };

          geom.computeBoundingBox();
          const hitBB = geom.boundingBox;
          const hitWidth = (hitBB.max.x - hitBB.min.x) + 0.75;
          const hitHeight = (hitBB.max.y - hitBB.min.y) + 0.65;

          const hitbox = new THREE.Mesh(
            new THREE.PlaneGeometry(hitWidth, hitHeight),
            new THREE.MeshBasicMaterial({
              transparent: true,
              opacity: 0.0,
              depthWrite: false,
              side: THREE.DoubleSide
            })
          );
          hitbox.position.copy(mesh.position);
          hitbox.rotation.copy(mesh.rotation);
          hitbox.userData.letterMesh = mesh;

          letters.push(mesh);
          clickableMeshes.push(mesh);
          letterHitboxes.push(hitbox);
          textRoot.add(mesh);
          textRoot.add(hitbox);
        }
      }

      const loader = new FontLoader();
      loader.load(
        "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json",
        (font) => {
          buildLetters(font);
          buildLoadingText(font);
          animate();
        },
        undefined,
        (err) => showError("Font load failed.\n" + err)
      );

      let mouseX = 0, mouseY = 0;
      window.addEventListener("pointermove", (e) => {
        mouseX = (e.clientX / window.innerWidth) * 2 - 1;
        mouseY = (e.clientY / window.innerHeight) * 2 - 1;
      });

      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();
      let isDraggingOrbit = false;
      let dragStart = { x: 0, y: 0 };
      const sphereBaseRotX =  Math.PI / 6;
      const sphereBaseRotY = 0;
      let cameraDistance = 6.8;
      const cameraLookTarget = new THREE.Vector3(0, 0.8, 0);
      const orbitBaseYaw = 0;
      const orbitBasePitch = -0.175;
      let orbitYaw = orbitBaseYaw;
      let orbitPitch = orbitBasePitch;
      let orbitYawTarget = orbitYaw;
      let orbitPitchTarget = orbitPitch;

      // Ensure scene resets fully on reload
      window.addEventListener("load", () => {
        orbitYaw = orbitBaseYaw;
        orbitPitch = orbitBasePitch;
        orbitYawTarget = orbitBaseYaw;
        orbitPitchTarget = orbitBasePitch;
        cameraDistance = 5.2;
      });



      function setPointerFromEvent(e) {
        pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
        pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
      }

      window.addEventListener("pointerdown", (e) => {
        setPointerFromEvent(e);
        raycaster.setFromCamera(pointer, camera);

        const letterHits = raycaster.intersectObjects(letterHitboxes, false);
        if (letterHits.length > 0) {
          const letter = letterHits[0].object.userData.letterMesh || letterHits[0].object;
          letter.userData.bounceTime = 0;
          letter.userData.isJumping = true;
          return;
        }

        // Start orbiting when clicking anywhere else on screen, including over the planet.
        isDraggingOrbit = true;
        dragStart.x = e.clientX;
        dragStart.y = e.clientY;
      });

      window.addEventListener("pointermove", (e) => {
        mouseX = (e.clientX / window.innerWidth) * 2 - 1;
        mouseY = (e.clientY / window.innerHeight) * 2 - 1;

        if (!isDraggingOrbit) return;

        const dx = e.clientX - dragStart.x;
        const dy = e.clientY - dragStart.y;
        dragStart.x = e.clientX;
        dragStart.y = e.clientY;

        orbitYawTarget -= dx * 0.002;
        orbitPitchTarget += dy * 0.002;

        const yawLimit = Math.PI / 6;   // 30 degrees each direction
        const pitchLimit = Math.PI / 6; // 30 degrees each direction
        orbitYawTarget = Math.max(orbitBaseYaw - yawLimit, Math.min(orbitBaseYaw + yawLimit, orbitYawTarget));
        orbitPitchTarget = Math.max(orbitBasePitch - pitchLimit, Math.min(orbitBasePitch + pitchLimit, orbitPitchTarget));
      });

      window.addEventListener("pointerup", () => {
        isDraggingOrbit = false;
      });

      window.addEventListener("pointerleave", () => {
        isDraggingOrbit = false;
      });

      window.addEventListener("wheel", (e) => {
        e.preventDefault();
        cameraDistance += e.deltaY * 0.01;
        cameraDistance = Math.max(2.5, Math.min(10.4, cameraDistance));
      }, { passive: false });

      const clock = new THREE.Clock();

      function update(dt, t) {
        sphereGroup.rotation.x = sphereBaseRotX;
        sphereGroup.rotation.y = sphereBaseRotY;
        sphereGroup.rotation.z = 0;

        orbitYaw += (orbitYawTarget - orbitYaw) * dt * 6.0;
        orbitPitch += (orbitPitchTarget - orbitPitch) * dt * 6.0;

        if (planetModel) {
          planetModel.position.y = 0;
          const baseScale = 6.6666666667;
          planetModel.scale.set(baseScale, baseScale, baseScale);
        }

        if (loadingGroup.visible) {
          // Keep loading text centered in scene while the planet asset is not yet visible
          loadingGroup.position.set(0, 0, 0);
          loadingGroup.rotation.set(0, 0, 0);

          for (let i = 0; i < loadingLetters.length; i++) {
            const mesh = loadingLetters[i];
            const phase = t * 2.0 + i * 0.6;
            mesh.position.copy(mesh.userData.basePos);
            mesh.position.y += Math.sin(phase) * 0.05;
            mesh.rotation.z = Math.sin(phase * 0.8) * 0.015;
            mesh.scale.set(0.995, 1.005, 1);
          }
        }

        for (let idx = 0; idx < letters.length; idx++) {
          const letter = letters[idx];
          const hitbox = letterHitboxes[idx];
          const u = letter.userData;

          const localUp = new THREE.Vector3(
            -Math.sin(u.baseRot.z),
             Math.cos(u.baseRot.z),
             0
          );

          const idleLift = Math.sin(t * 10.4 + u.phase) * 0.045;
          const idleZ = Math.cos(t * 8.8 + u.phase * 1.3) * 0.035;
          const idleRotX = Math.sin(t * 11.2 + u.phase) * 0.03;
          const idleRotY = Math.cos(t * 8.4 + u.phase * 0.8) * 0.03;
          const idleRotZ = Math.sin(t * 9.6 + u.phase) * 0.02;

          let jump = 0;
          let groundSquash = 0;
          if (u.isJumping) {
            u.bounceTime += dt * (3.6 + u.bounceOffset * 0.5); // twice as fast
            const p = Math.min(u.bounceTime / (Math.PI * 0.5), 1);
            jump = Math.sin(p * Math.PI);
            groundSquash = Math.pow(Math.cos(p * Math.PI * 2) * 0.5 + 0.5, 6);

            if (p >= 1) {
              u.isJumping = false;
              u.bounceTime = 0;
            }
          }

          letter.position.copy(u.basePos);
          letter.position.addScaledVector(localUp, idleLift + jump * 0.95);
          letter.position.z += idleZ;

          letter.rotation.set(
            idleRotX + jump * 0.03,
            idleRotY + jump * 0.02,
            u.baseRot.z + idleRotZ
          );

          const stretch = jump * 0.32;
          const squash = (u.isJumping ? groundSquash * 0.18 : 0);
          letter.scale.set(
            1 - squash + stretch * 0.06,
            1 + stretch - squash * 0.08,
            1 - squash * 0.04
          );

          if (hitbox) {
            hitbox.position.copy(letter.position);
            hitbox.rotation.copy(letter.rotation);
          }
        }

        const cosPitch = Math.cos(orbitPitch);
        const targetCamX = cameraLookTarget.x + Math.sin(orbitYaw) * cosPitch * cameraDistance;
        const targetCamY = cameraLookTarget.y + Math.sin(orbitPitch) * cameraDistance;
        const targetCamZ = cameraLookTarget.z + Math.cos(orbitYaw) * cosPitch * cameraDistance;

        camera.position.x += (targetCamX - camera.position.x) * dt * 3.0;
        camera.position.y += (targetCamY - camera.position.y) * dt * 3.0;
        camera.position.z += (targetCamZ - camera.position.z) * dt * 3.0;
        camera.lookAt(cameraLookTarget);

        // Keep scene objects fixed in world space while the camera orbits.
        sphereGroup.position.set(0, 0, 0);
        aoPlane.position.x = sphereGroup.position.x;
        aoPlane.position.z = sphereGroup.position.z;

        // Screen-anchored 3D text: keep it framed near the top regardless of display shape
        const camForward = new THREE.Vector3();
        camera.getWorldDirection(camForward);

        const camRight = new THREE.Vector3().crossVectors(camForward, camera.up).normalize();
        const camUp = new THREE.Vector3().copy(camera.up).normalize();

        const depthPoint = new THREE.Vector3().copy(camera.position).addScaledVector(camForward, composition.textDepthFromCamera);

        const vFov = THREE.MathUtils.degToRad(camera.fov);
        const viewHeight = 2 * Math.tan(vFov * 0.5) * composition.textDepthFromCamera;
        const viewWidth = viewHeight * camera.aspect;

        const xOffset = 0.0;
        const yOffset = (0.5 - composition.textTopScreenY) * viewHeight;

        textRoot.position.copy(depthPoint)
          .addScaledVector(camRight, xOffset * viewWidth)
          .addScaledVector(camUp, yOffset);

        // keep the text facing camera consistently
        textRoot.quaternion.copy(camera.quaternion);

        // slight aspect compensation so wide/tall displays keep a similar text read
        const aspectComp = THREE.MathUtils.clamp(1.0 / Math.sqrt(camera.aspect), 0.82, 1.18);
        textRoot.scale.setScalar(composition.textScaleBase * aspectComp);
      }

      function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.033);
        const t = clock.elapsedTime;
        bgUniforms.uTime.value = t;
        update(dt, t);

        renderer.autoClear = true;
        renderer.render(bgScene, bgCamera);
        renderer.render(scene, camera);
      }

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        bgUniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
      });

    } catch (err) {
      showError(err);
    }
  </script>
</body>
</html>
