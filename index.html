<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to the Nullosphere</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      cursor: default;
      font-family: system-ui, sans-serif;
    }
    canvas { display: block; }
    #hint {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="hint">Click a letter</div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.25, 19);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 1.25);
    scene.add(ambient);

    const key = new THREE.DirectionalLight(0xffffff, 1.4);
    key.position.set(4, 8, 12);
    scene.add(key);

    const rim = new THREE.DirectionalLight(0x99bbff, 0.5);
    rim.position.set(-8, 3, -4);
    scene.add(rim);

    const sphereGroup = new THREE.Group();
    scene.add(sphereGroup);

    const sphereGeo = new THREE.SphereGeometry(3.35, 24, 18);
    const sphereMat = new THREE.MeshBasicMaterial({
      color: 0xffffff,
      wireframe: true,
      transparent: true,
      opacity: 0.95
    });
    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
    sphereGroup.add(sphere);

    const innerRing = new THREE.Mesh(
      new THREE.TorusGeometry(2.1, 0.03, 8, 90),
      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.65 })
    );
    innerRing.rotation.x = 1.1;
    innerRing.rotation.y = 0.3;
    sphereGroup.add(innerRing);

    const PATTERNS = {
      "A": ["01110","10001","10001","11111","10001","10001","10001"],
      "B": ["11110","10001","10001","11110","10001","10001","11110"],
      "C": ["01111","10000","10000","10000","10000","10000","01111"],
      "E": ["11111","10000","10000","11110","10000","10000","11111"],
      "H": ["10001","10001","10001","11111","10001","10001","10001"],
      "L": ["10000","10000","10000","10000","10000","10000","11111"],
      "M": ["10001","11011","10101","10101","10001","10001","10001"],
      "N": ["10001","11001","10101","10011","10001","10001","10001"],
      "O": ["01110","10001","10001","10001","10001","10001","01110"],
      "P": ["11110","10001","10001","11110","10000","10000","10000"],
      "R": ["11110","10001","10001","11110","10100","10010","10001"],
      "S": ["01111","10000","10000","01110","00001","00001","11110"],
      "T": ["11111","00100","00100","00100","00100","00100","00100"],
      "U": ["10001","10001","10001","10001","10001","10001","01110"],
      "V": ["10001","10001","10001","10001","10001","01010","00100"],
      "W": ["10001","10001","10001","10101","10101","11011","10001"],
      " ": ["000","000","000","000","000","000","000"]
    };

    const phrase = "WELCOME TO THE NULLOSPHERE";
    const letters = [];
    const clickableMeshes = [];
    const textRoot = new THREE.Group();
    scene.add(textRoot);

    const clayMat = new THREE.MeshStandardMaterial({
      color: 0xd8d2c6,
      roughness: 0.95,
      metalness: 0.02,
      flatShading: true
    });

    function makeWonkyVoxel(w, h, d) {
      const g = new THREE.BoxGeometry(w, h, d);
      const pos = g.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const y = pos.getY(i);
        const z = pos.getZ(i);

        const jx = (Math.random() - 0.5) * 0.055;
        const jy = (Math.random() - 0.5) * 0.055;
        const jz = (Math.random() - 0.5) * 0.08;

        pos.setXYZ(
          i,
          x + jx + Math.sin(y * 7 + z * 11) * 0.01,
          y + jy + Math.sin(x * 8 + z * 5) * 0.01,
          z + jz
        );
      }
      pos.needsUpdate = true;
      g.computeVertexNormals();
      return g;
    }

    function makeLetter(char) {
      const pattern = PATTERNS[char] || PATTERNS[" "];
      const root = new THREE.Group();
      const blockSize = 0.36;
      const depth = 0.32;

      const rows = pattern.length;
      const cols = pattern[0].length;

      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          if (pattern[y][x] !== "1") continue;

          const geo = makeWonkyVoxel(
            blockSize * (0.92 + Math.random() * 0.24),
            blockSize * (0.92 + Math.random() * 0.24),
            depth * (0.85 + Math.random() * 0.5)
          );
          const mesh = new THREE.Mesh(geo, clayMat);

          mesh.position.set(
            (x - cols / 2 + 0.5) * blockSize * 1.05 + (Math.random() - 0.5) * 0.03,
            -(y - rows / 2 + 0.5) * blockSize * 1.05 + (Math.random() - 0.5) * 0.03,
            (Math.random() - 0.5) * 0.18
          );
          mesh.rotation.set(
            (Math.random() - 0.5) * 0.18,
            (Math.random() - 0.5) * 0.18,
            (Math.random() - 0.5) * 0.12
          );
          mesh.userData.letterRoot = root;
          root.add(mesh);
          clickableMeshes.push(mesh);
        }
      }

      root.userData = {
        char,
        kick: 0,
        kickVel: 0,
        phase: Math.random() * Math.PI * 2,
        arcAngle: 0,
        basePos: new THREE.Vector3(),
        baseRot: new THREE.Euler(),
        baseScale: new THREE.Vector3(1, 1, 1),
      };

      return root;
    }

    for (const ch of phrase) {
      const letter = makeLetter(ch);
      letters.push(letter);
      textRoot.add(letter);
    }

    const weights = letters.map(l => (l.userData.char === " " ? 1.1 : 1.9));
    const totalWeight = weights.reduce((a, b) => a + b, 0);

    let cursor = 0;
    const arcSpan = 1.9;
    const radius = 11.0;

    for (let i = 0; i < letters.length; i++) {
      const letter = letters[i];
      const frac = weights[i] / totalWeight;
      const centerFrac = cursor + frac * 0.5;
      const a = (centerFrac - 0.5) * arcSpan;
      cursor += frac;

      const x = Math.sin(a) * radius;
      const y = 6.7 + Math.cos(a) * 1.55;
      const z = -Math.abs(a) * 1.3;

      letter.position.set(x, y, z);
      letter.rotation.z = -a * 0.82;
      letter.rotation.x = -0.08 + Math.abs(a) * 0.05;

      letter.userData.arcAngle = a;
      letter.userData.basePos.copy(letter.position);
      letter.userData.baseRot.copy(letter.rotation);
      letter.userData.baseScale.copy(letter.scale);
    }

    let mouseX = 0, mouseY = 0;
    window.addEventListener("pointermove", (e) => {
      mouseX = (e.clientX / window.innerWidth) * 2 - 1;
      mouseY = (e.clientY / window.innerHeight) * 2 - 1;
    });

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    window.addEventListener("click", (e) => {
      pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(clickableMeshes, false);
      if (hits.length > 0) {
        const letterRoot = hits[0].object.userData.letterRoot;
        if (letterRoot) {
          letterRoot.userData.kickVel += 1.8;
          letterRoot.userData.kick = Math.min(letterRoot.userData.kick + 0.75, 2.5);
        }
      }
    });

    const tempPos = new THREE.Vector3();
    function update(dt, t) {
      sphereGroup.rotation.y += dt * 0.28;
      sphereGroup.rotation.x = Math.sin(t * 0.25) * 0.12;
      sphereGroup.rotation.z += dt * 0.07;

      for (const letter of letters) {
        const u = letter.userData;

        u.kickVel += (-u.kick * 9.0 - u.kickVel * 5.8) * dt;
        u.kick += u.kickVel * dt;
        if (Math.abs(u.kick) < 0.0002 && Math.abs(u.kickVel) < 0.0002) {
          u.kick = 0;
          u.kickVel = 0;
        }

        const idle1 = Math.sin(t * 1.5 + u.phase);
        const idle2 = Math.sin(t * 1.05 + u.phase * 1.7);
        const idle3 = Math.cos(t * 1.2 + u.phase * 0.7);

        letter.position.copy(u.basePos);
        letter.position.y += idle1 * 0.09;
        letter.position.z += idle2 * 0.12;

        letter.rotation.set(
          u.baseRot.x + idle2 * 0.03 + u.kick * 0.22,
          Math.sin(t * 0.9 + u.phase) * 0.04 + u.kick * 0.35,
          u.baseRot.z + idle3 * 0.035 + Math.sin(u.arcAngle * 4 + t * 2.4) * 0.01 + u.kick * 0.18
        );

        const s = 1 + Math.abs(u.kick) * 0.14 + idle2 * 0.01;
        letter.scale.set(
          s + u.kick * 0.09,
          s - u.kick * 0.06,
          1 + Math.abs(u.kick) * 0.16
        );

        for (let i = 0; i < letter.children.length; i++) {
          const m = letter.children[i];
          const q = i * 0.71 + u.phase * 0.3;
          tempPos.copy(m.position);
          tempPos.z += Math.sin(t * 4.0 + q) * 0.002 + u.kick * 0.03 * Math.sin(q + t * 9.0);
          m.position.z = tempPos.z;
          m.rotation.x += Math.sin(t * 1.3 + q) * 0.0009;
          m.rotation.y += Math.cos(t * 1.2 + q) * 0.0008;
        }
      }

      camera.position.x += ((mouseX * 1.2) - camera.position.x) * dt * 1.4;
      camera.position.y += ((1.25 - mouseY * 0.8) - camera.position.y) * dt * 1.4;
      camera.lookAt(0, 2.2, 0);
    }

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.033);
      const t = clock.elapsedTime;
      update(dt, t);
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
