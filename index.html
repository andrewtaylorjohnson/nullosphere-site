<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Simple 3D Demo</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #101114;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script>
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x101114);

  const camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth / window.innerHeight,
    0.1,
    100
  );
  camera.position.set(0, 2, 8);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambient = new THREE.AmbientLight(0xffffff, 0.7);
  scene.add(ambient);

  const dir = new THREE.DirectionalLight(0xffffff, 1.2);
  dir.position.set(5, 8, 6);
  scene.add(dir);

  // Grid so depth is obvious
  const grid = new THREE.GridHelper(20, 20, 0x666666, 0x333333);
  scene.add(grid);

  // Floating cubes
  const cubes = [];
  const cubeGeo = new THREE.BoxGeometry(1, 1, 1);

  function makeCube(x, y, z, color, sx = 1, sy = 1, sz = 1) {
    const mat = new THREE.MeshStandardMaterial({
      color,
      roughness: 0.35,
      metalness: 0.1
    });
    const mesh = new THREE.Mesh(cubeGeo, mat);
    mesh.position.set(x, y, z);
    mesh.scale.set(sx, sy, sz);
    scene.add(mesh);
    cubes.push(mesh);
  }

  makeCube(0, 1, 0, 0x00ffd0);
  makeCube(2.2, 1.4, -2, 0xff8844, 0.8, 1.3, 0.8);
  makeCube(-2.5, 0.8, -3.5, 0x66aaff, 1.2, 0.7, 1.2);
  makeCube(1, 2.2, -5.5, 0xff44aa, 0.7, 0.7, 1.5);
  makeCube(-1.2, 1.8, -7, 0xffff66, 1.4, 0.5, 0.5);

  // A bigger reference object in the distance
  const farGeo = new THREE.BoxGeometry(2.5, 2.5, 2.5);
  const farMat = new THREE.MeshStandardMaterial({ color: 0xffffff, wireframe: true });
  const farBox = new THREE.Mesh(farGeo, farMat);
  farBox.position.set(0, 2, -12);
  scene.add(farBox);

  function animate(t) {
    requestAnimationFrame(animate);

    const time = t * 0.001;

    cubes.forEach((cube, i) => {
      cube.rotation.x += 0.01 + i * 0.002;
      cube.rotation.y += 0.012 + i * 0.002;
      cube.position.y += Math.sin(time * 1.2 + i) * 0.003;
    });

    farBox.rotation.x = time * 0.3;
    farBox.rotation.y = time * 0.45;

    // gentle camera drift so you instantly know it's 3D
    camera.position.x = Math.sin(time * 0.35) * 1.2;
    camera.lookAt(0, 1.5, -3);

    renderer.render(scene, camera);
  }

  animate(0);

  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
